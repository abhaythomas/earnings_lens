services:
  earningslens:
    build:
      context: .
      dockerfile: Dockerfile
    image: earningslens-v2
    container_name: earningslens-v2
    ports:
      - "8501:8501"
    env_file:
      - path: .env
        required: false
    volumes:
      # Persist query logs across container restarts (bind-mounted host directory)
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
